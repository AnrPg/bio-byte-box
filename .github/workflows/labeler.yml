name: Label PRs

# grant just enough scope to label PRs
permissions:
  pull-requests: write
  contents: read     # needed to fetch your .github/labeler.yml
  
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/labeler@v5
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
